name: magic_ext_oauth
description: >
  Magic OAuth extension for social login (Google, Apple, Facebook, GitHub, ...).
  Fork of magiclabs/magic-flutter with flutter_web_auth_2 replacing the
  abandoned flutter_web_auth (broken on scene-based iOS).
version: 0.4.8
homepage: https://github.com/erykkruk/magic-flutter
repository: https://github.com/erykkruk/magic-flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  magic_sdk: ^6.0.0
  package_info_plus: ^4.2.0
  uri: ^1.0.0
  flutter_web_auth_2: ^4.0.0
  crypto: ^3.0.1
  json_annotation: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  build_runner: ^2.1.11
  json_serializable: ^6.2.0
